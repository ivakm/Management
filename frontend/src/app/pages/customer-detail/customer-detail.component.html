<div class="customer-dialog">
  <h2 mat-dialog-title>{{ isEditMode ? "Edit Customer" : "Add New Customer" }}</h2>

  <mat-dialog-content>
    <form [formGroup]="customerForm" class="customer-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="name" placeholder="Enter customer name" />
        <mat-error *ngIf="customerForm.get('name')?.invalid && customerForm.get('name')?.touched">
          {{ getNameError() }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Enter email address" />
        <mat-error *ngIf="customerForm.get('email')?.invalid && customerForm.get('email')?.touched">
          {{ getEmailError() }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Phone</mat-label>
        <input matInput formControlName="phone" placeholder="Enter phone number" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Company</mat-label>
        <input matInput formControlName="company" placeholder="Enter company name" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="active">Active</mat-option>
          <mat-option value="inactive">Inactive</mat-option>
          <mat-option value="pending">Pending</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()" type="button">Cancel</button>
    <button
      mat-raised-button
      color="primary"
      (click)="onSubmit()"
      [disabled]="customerForm.invalid || isLoading"
    >
      <span *ngIf="!isLoading">{{ isEditMode ? "Update" : "Create" }}</span>
      <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
    </button>
  </mat-dialog-actions>
</div>
