<div class="login-container" @fadeIn>
  <mat-card class="login-card" @slideIn>
    <div class="login-header">
      <div class="logo-container">
        <div class="logo">
          <span class="logo-icon">M</span>
        </div>
        <h1>Management Dashboard</h1>
      </div>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Enter your email">
        <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          {{ getEmailError() }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password">
        <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
          <span class="material-icons">{{ hidePassword ? 'visibility_off' : 'visibility' }}</span>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          {{ getPasswordError() }}
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="login-button" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
      </button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a routerLink="/register">Create one</a></p>
      <div class="demo-credentials">
        <p class="demo-title">Demo Credentials:</p>
        <p>Email: admin&#64;example.com</p>
        <p>Password: admin123</p>
      </div>
    </div>
  </mat-card>
</div>
